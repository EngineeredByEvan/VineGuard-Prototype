; VineGuard ESP32 Node Firmware
; Targets: Heltec WiFi LoRa 32 V3 (ESP32-S3 + SX1262) and compatible boards
; Build environments:
;   debug_serial         - Serial JSON output, mock sensors, no radio required
;   lora_p2p             - LoRa P2P compact JSON to gateway, real sensors, deep sleep
;   lorawan_otaa         - LoRaWAN OTAA to ChirpStack/TTN, real sensors, deep sleep
;   lora_p2p_precision   - LoRa P2P with leaf wetness + solar ADC (precision+ node)
;   debug_serial_esp32dev- Generic ESP32 dev board for bench testing without Heltec
;   native_test          - Host-side unit tests (no MCU needed)

[platformio]
default_envs = debug_serial

; ─── Shared library deps ────────────────────────────────────────────────────
[env]
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, colorize
upload_speed = 921600
lib_ldf_mode = deep+
lib_deps =
    bblanchon/ArduinoJson@^6.21.4
    adafruit/Adafruit BME280 Library@^2.2.4
    adafruit/Adafruit Unified Sensor@^1.1.14
    adafruit/Adafruit VEML7700 Library@^2.1.6
    jgromes/RadioLib@^6.4.2

; ─── Heltec WiFi LoRa 32 V3 (ESP32-S3 + SX1262, 915 MHz) ───────────────────
[env:debug_serial]
platform = espressif32
board = heltec_wifi_lora_32_V3
build_flags =
    -DBOARD_HELTEC_V3
    -DBUILD_MODE_DEBUG_SERIAL
    -DMOCK_SENSORS
    -DDEBUG_LEVEL=2
    -DENABLE_LEAF_WETNESS=0
    -DENABLE_OLED=0
    -DENABLE_SOLAR_ADC=0
    -DUSE_DEEP_SLEEP=0
    -DSAMPLE_INTERVAL_S=15
    -DTRANSMIT_INTERVAL_S=15

[env:lora_p2p]
platform = espressif32
board = heltec_wifi_lora_32_V3
build_flags =
    -DBOARD_HELTEC_V3
    -DBUILD_MODE_LORA_P2P
    -DDEBUG_LEVEL=1
    -DENABLE_LEAF_WETNESS=0
    -DENABLE_OLED=0
    -DENABLE_SOLAR_ADC=0
    -DUSE_DEEP_SLEEP=1
    -DSAMPLE_INTERVAL_S=900
    -DTRANSMIT_INTERVAL_S=900

[env:lorawan_otaa]
platform = espressif32
board = heltec_wifi_lora_32_V3
build_flags =
    -DBOARD_HELTEC_V3
    -DBUILD_MODE_LORAWAN_OTAA
    -DDEBUG_LEVEL=1
    -DENABLE_LEAF_WETNESS=0
    -DENABLE_OLED=0
    -DENABLE_SOLAR_ADC=0
    -DUSE_DEEP_SLEEP=1
    -DSAMPLE_INTERVAL_S=900
    -DTRANSMIT_INTERVAL_S=900

; Precision+ node adds leaf wetness sensor (RS485) and solar ADC input
[env:lora_p2p_precision]
platform = espressif32
board = heltec_wifi_lora_32_V3
build_flags =
    -DBOARD_HELTEC_V3
    -DBUILD_MODE_LORA_P2P
    -DDEBUG_LEVEL=1
    -DENABLE_LEAF_WETNESS=1
    -DENABLE_OLED=0
    -DENABLE_SOLAR_ADC=1
    -DUSE_DEEP_SLEEP=1
    -DSAMPLE_INTERVAL_S=900
    -DTRANSMIT_INTERVAL_S=900

; Generic ESP32 devkit for bench testing without real Heltec hardware
[env:debug_serial_esp32dev]
platform = espressif32
board = esp32dev
build_flags =
    -DBOARD_GENERIC_ESP32
    -DBUILD_MODE_DEBUG_SERIAL
    -DMOCK_SENSORS
    -DDEBUG_LEVEL=2
    -DENABLE_LEAF_WETNESS=0
    -DENABLE_OLED=0
    -DENABLE_SOLAR_ADC=0
    -DUSE_DEEP_SLEEP=0
    -DSAMPLE_INTERVAL_S=15
    -DTRANSMIT_INTERVAL_S=15

; Host-side unit tests – runs on development machine without MCU
[env:native_test]
platform = native
build_flags =
    -DNATIVE_TEST
    -DMOCK_SENSORS
    -DDEBUG_LEVEL=0
lib_deps =
    bblanchon/ArduinoJson@^6.21.4
test_build_project_src = false
