services:
  db:
    image: timescale/timescaledb:latest-pg14
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_USER: postgres
      POSTGRES_DB: vineguard
    volumes:
      - timescale-data:/var/lib/postgresql/data
      - ./sql/init_timescaledb.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vineguard"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  mqtt:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"   # plain / local dev / simulator
      # - "8883:8883" # TLS / production gateway — enable when certs are present
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/certs:/mosquitto/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h localhost -p 1883 -t healthcheck -m ping -q 0 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.api
    env_file:
      - ../services/api/.env.example
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  ingestor:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.ingestor
    env_file:
      - ../services/ingestor/.env.example
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mqtt:
        condition: service_healthy

  analytics:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.analytics
    env_file:
      - ../services/analytics/.env.example
    depends_on:
      db:
        condition: service_healthy

  simulator:
    build:
      context: ../..
      dockerfile: cloud/infrastructure/Dockerfile.simulator
    profiles:
      - demo
    environment:
      - SIMULATOR_MQTT_HOST=mqtt
      - SIMULATOR_MQTT_PORT=1883
      - SIMULATOR_SCENARIO=demo
    depends_on:
      mqtt:
        condition: service_healthy
      ingestor:
        condition: service_started

volumes:
  timescale-data:
