# VineGuard MQTT broker — Mosquitto 2.x
#
# Port 1883: plain-text, allow_anonymous — for intra-container / simulator / local dev
# Port 8883: TLS + password auth         — for real edge gateways in production

# ── Plain listener (local dev / demo) ──────────────────────────────────────
listener 1883
allow_anonymous true

# ── TLS listener (production gateway path) ──────────────────────────────────
#listener 8883
#cafile   /mosquitto/certs/ca.crt
#certfile /mosquitto/certs/server.crt
#keyfile  /mosquitto/certs/server.key
#require_certificate false
#allow_anonymous false
#password_file /mosquitto/config/passwordfile

# Shared
persistence false
log_dest stdout
log_type all
